version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: doingok-postgres
    environment:
      POSTGRES_USER: doingok
      POSTGRES_PASSWORD: doingok
      POSTGRES_DB: doingok
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doingok"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doingok-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://doingok:doingok@postgres:5432/doingok?schema=public
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    command: npm run dev

volumes:
  postgres_data:
